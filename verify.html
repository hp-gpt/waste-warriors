<html>

<head>
    <title>Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200;1,9..40,200&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,600;1,9..40,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

</head>
<form>
    <center>
        <label style="font-size:60px; font-family: DM Sans;">Code</label><br>
        <input type="password" placeholder="Enter code" style="font-size:40px;font-family: DM Sans;text-align:center;"
            id="pswd"><br>

        <button style="font-size:30px; font-family: DM Sans; border-radius: 50px;padding:10px 60px;"
            onclick="checkPassword(event)">Go</button>
    </center>
</form>

<body></body>

</html>
<script>
    function checkPassword(event) {
        event.preventDefault(); // This stops the page from refreshing
        const password = document.getElementById("pswd").value;

        if (password === "reprocessing") {
            window.location.assign("weightcheck.html"); // Try .assign() for better compatibility
        } else {
            alert("Wrong password!");
        }
    }

</script>
