<div class="header">
    <img class="header-img" src="https://i.postimg.cc/FH2kkyrJ/logo.png"> <img class="header-img"
        src="https://i.postimg.cc/zB8v8L4r/schoologo.png"> <br>
    <center>The Waste Warriors </center>
</div>
<form>
    <center>
        <label style="font-size:30px; font-family: DM Sans;">
            Thank you for filling in the form! We appreciate your time.<br>
            Do not worry, the form is filled in!<br>
            This is just an extra step to verify the inputted weight.<br>
            Please show this to the security guard and ask
            them to fill in the verification code.

            <br>
            <br> Enter the code below;<br>
        </label><br>
        <input type="password" placeholder="Enter code" style="font-size:40px;font-family: DM Sans;text-align:center;"
            id="pswd"><br>

        <button style="font-size:30px; font-family: DM Sans; border-radius: 50px;padding:10px 60px;"
            onclick="checkPassword(event)">Go</button>
    </center>
</form>

<body></body>

</html>
<script>
    function checkPassword(event) {
        event.preventDefault(); // This stops the page from refreshing
        const password = document.getElementById("pswd").value;

        if (password === "reprocessing") {
            window.location.assign("weightcheck.html"); // Try .assign() for better compatibility
        } else {
            alert("Wrong password!");
        }
    }

</script>
