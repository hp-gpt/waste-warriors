        rel="stylesheet">

<form id="AKfycbyMgeX-lJLzFugXCz2rpdVy-9zdlL_VKrVSPqXsWj1cMrCO8UOH09tQudZ32ImlPeDIng" method="POST"
    action="https://script.google.com/macros/s/AKfycbyMgeX-lJLzFugXCz2rpdVy-9zdlL_VKrVSPqXsWj1cMrCO8UOH09tQudZ32ImlPeDIng/exec">
    <center>
        <div class="student-id">
            Re-enter Student ID: <br>
            <input type="text" name="StudentID" placeholder="ID Number" required><br>
        </div>
        <label style="font-size:60px; font-family: DM Sans;">EnterVerified Weight</label><br>
        <input type="number" placeholder="Verified Weight"
            style="font-size:40px;font-family: DM Sans;text-align:center;" name="Weight" required>
    </center>
    <div class="submit-button"><button type="submit" class="button">Submit</button>
</form>

<body></body>
<script>

    window.addEventListener("DOMContentLoaded", function () {
        const yourForm = document.getElementById('AKfycbyMgeX-lJLzFugXCz2rpdVy-9zdlL_VKrVSPqXsWj1cMrCO8UOH09tQudZ32ImlPeDIng');
        yourForm.addEventListener("submit", function (e) {
            e.preventDefault();
            const data = new FormData(yourForm);
            const action = e.target.action;
            fetch(action, {
                method: 'POST',
                body: data,
            }).then(() => {
                alert('Success! Thank you for your donation :)');
                window.location.replace('index.html')
            })
        })
    });

</script>

</html>
